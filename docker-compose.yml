name: ${COMPOSE_PROJECT_NAME}

services:
  app:
    build:
      context: images/application
      args:
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: ${COMPOSE_PROJECT_NAME}_app
    depends_on:
      - mariadb
      - opensearch
      - redis
      - rabbitmq
    init: true
    volumes:
      - ./application:/var/www/html
      - ./images/application/usr/local/etc/php/conf.d/php.ini:/usr/local/etc/php/conf.d/php.ini
      - ./images/application/usr/local/etc/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./images/application/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
      - ./images/application/usr/local/etc/php/conf.d/docker-php-ext-spx.ini:/usr/local/etc/php/conf.d/docker-php-ext-spx.ini
      - ./data/share:/usr/share/data
    working_dir: /var/www/html
    networks:
      - project_network
    environment:
      - PHP_IDE_CONFIG=serverName=${DOMAIN}
      - DOMAIN=${DOMAIN}
    extra_hosts:
      host.docker.internal: host-gateway

  nginx:
    image: nginx:latest
    container_name: ${COMPOSE_PROJECT_NAME}_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./application:/var/www/html
      - ./images/application/nginx/config/http-application.conf.template:/etc/nginx/templates/http-application.conf.template
      - ./images/application/nginx/config/https-application.conf.template:/etc/nginx/templates/https-application.conf.template
      - ./images/application/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - project_network

  mariadb:
    image: mariadb:10.6
    container_name: ${COMPOSE_PROJECT_NAME}_mariadb
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - ./data/db/data:/var/lib/mysql
      - ./data/logs:/var/log/mysql
      - ./images/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-magento}
      MARIADB_USER: ${MARIADB_USER:-magento}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-magento}
    networks:
      - project_network

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: ${COMPOSE_PROJECT_NAME}_opensearch
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms2g -Xmx2g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    networks:
      - project_network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    container_name: ${COMPOSE_PROJECT_NAME}_opensearch_dashboards
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - project_network

  redis:
    image: redis:7.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - project_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-magento}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-magento}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - project_network

  mail:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME}_mail
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - project_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${COMPOSE_PROJECT_NAME}_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: ${MARIADB_USER:-magento}
      PMA_PASSWORD: ${MARIADB_PASSWORD:-magento}
    depends_on:
      - mariadb
    networks:
      - project_network

networks:
  project_network:
